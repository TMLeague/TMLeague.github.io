# This workflow import games and then commit them
# author: Imrihil

name: Import games

on:
  workflow_dispatch:
    inputs:
      fetch-finished-divisions:
        description: fetch finished divisions
        required: false
        default: false
      fetch-finished-games:
        description: fetch finished games
        required: false
        default: false
      league:
        description: league id
        required: false
        default: ''
      season:
        description: season id
        required: false
        default: ''
      division:
        description: division id
        required: false
        default: ''
      cf-clearance:
        description: 'cf_clearance cookie from DevTools/Application/Cookies/https://www.thronemaster.net'
        required: false
        default: ''
      user-agent:
        description: 'browser user agent from DevTools/Console: navigator.userAgent'
        required: false
        default: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x

    - name: Build Importer
      run: dotnet build src/TMGameImporter/TMGameImporter.csproj

    - name: Install Playwright Browsers & Deps
      run: |
        pw_driver=$(find src/TMGameImporter/bin -name playwright.ps1 | head -n 1)
        if [ -z "$pw_driver" ]; then
          dotnet exec src/TMGameImporter/bin/Debug/net8.0/Microsoft.Playwright.dll install --with-deps chromium
        else
          pw_path=$(dirname "$pw_driver")
          dotnet exec "$pw_path/.playwright/node/linux-x64/playwright.js" install --with-deps chromium
        fi

    - name: Run TMGameImporter
      run: dotnet run --project src/TMGameImporter/TMGameImporter.csproj -c Release
           --BaseLocation src/TMLeague/wwwroot/data
           --FetchFinishedDivisions ${{ github.event.inputs.fetch-finished-divisions || false }}
           --FetchFinishedGames ${{ github.event.inputs.fetch-finished-games || false }}
           --League "${{ github.event.inputs.league }}"
           --Season "${{ github.event.inputs.season }}"
           --Division "${{ github.event.inputs.division }}"
           --CfClearance "${{ github.event.inputs.cf-clearance }}"
           --UserAgent "${{ github.event.inputs.user-agent }}"

    - name: Commit & Push changes
      uses: actions-js/push@master
